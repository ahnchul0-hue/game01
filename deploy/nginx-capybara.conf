# Rate limiting zone — 10 requests/second per IP, 10MB shared memory
limit_req_zone $binary_remote_addr zone=capybara:10m rate=10r/s;

server {
    listen 80;
    server_name _;

    root /home/cc2/game01/client/dist;
    index index.html;

    # Security headers — include snippet으로 모든 location에 적용
    # (Nginx는 하위 location에 add_header가 있으면 상위 server의 add_header를 상속하지 않음)
    include /home/cc2/game01/deploy/nginx-security-headers.conf;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public";
        include /home/cc2/game01/deploy/nginx-security-headers.conf;
    }

    # Hashed JS/CSS assets — long cache
    location ~* \.(?:js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        include /home/cc2/game01/deploy/nginx-security-headers.conf;
    }

    # Images & fonts
    location ~* \.(?:png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
        include /home/cc2/game01/deploy/nginx-security-headers.conf;
    }

    # API reverse proxy
    location /api/ {
        limit_req zone=capybara burst=20 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        include /home/cc2/game01/deploy/nginx-security-headers.conf;
    }

    # Gzip
    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain application/javascript text/css application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;
}
