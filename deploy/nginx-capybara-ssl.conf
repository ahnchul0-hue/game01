# HTTPS configuration template for Capybara Runner
# Usage:
#   1. Install certbot: sudo apt install certbot python3-certbot-nginx
#   2. Replace YOUR_DOMAIN with actual domain (e.g. capybara.example.com)
#   3. Run: sudo certbot --nginx -d YOUR_DOMAIN
#   4. Copy this to /etc/nginx/sites-available/ and symlink to sites-enabled

# Rate limiting zone — 10 requests/second per IP, 10MB shared memory
limit_req_zone $binary_remote_addr zone=capybara:10m rate=10r/s;

server {
    listen 80;
    server_name YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # Managed by Certbot (paths auto-filled after certbot run)
    ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # HSTS — 1 year
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /home/cc2/game01/client/dist;
    index index.html;

    include /home/cc2/game01/deploy/nginx-security-headers.conf;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public";
        include /home/cc2/game01/deploy/nginx-security-headers.conf;
    }

    # Hashed JS/CSS assets — long cache
    location ~* \.(?:js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        include /home/cc2/game01/deploy/nginx-security-headers.conf;
    }

    # Images & fonts
    location ~* \.(?:png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
        include /home/cc2/game01/deploy/nginx-security-headers.conf;
    }

    # API reverse proxy
    location /api/ {
        limit_req zone=capybara burst=20 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        include /home/cc2/game01/deploy/nginx-security-headers.conf;
    }

    # Gzip
    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain application/javascript text/css application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;
}
